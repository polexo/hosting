<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Simulateur de couverture murale</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Select2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <!-- Mon CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container mt-3 mb-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Simulateur de couverture murale (sans découpe)</h5>
      </div>
      <div class="card-body">
        <form id="formCarrelage" class="row g-3">
          <div class="col-12">
            <label for="dimensionsMur" class="form-label">Dimensions du mur (Largeur x Hauteur en cm)</label>
            <select class="form-select" id="dimensionsMur" required>
              <option value="">Choisir...</option>
            </select>
          </div>
          <div class="col-6">
            <label for="longueurCarreau" class="form-label">Largeur du carreau (cm)</label>
            <input type="number" class="form-control" id="longueurCarreau" required>
          </div>
          <div class="col-6">
            <label for="hauteurCarreau" class="form-label">Hauteur du carreau (cm)</label>
            <input type="number" class="form-control" id="hauteurCarreau" required>
          </div>
<div class="col-12 btn-group">
  <button type="button" class="btn btn-warning flex-fill" id="switchBtn">🔄 Inverser largeur/hauteur</button>
  <button type="submit" class="btn btn-success flex-fill">Simuler</button>
  <button type="button" class="btn btn-secondary flex-fill" id="saveBtn">💾 Enregistrer la simulation</button>
</div>

        </form>
      </div>
    </div>

    <!-- Toggle bouton -->
    <div class="mt-3">
      <button class="btn btn-info w-100" type="button" data-bs-toggle="collapse" data-bs-target="#resultatCollapse" aria-expanded="false" aria-controls="resultatCollapse">
        📊 Afficher / Masquer les résultats
      </button>
    </div>

    <!-- Pavé résultats repliable -->
    <div class="collapse mt-3" id="resultatCollapse">
      <div id="resultat"></div>
    </div>

    <div class="mt-3">
      <canvas id="canvasMur"></canvas>
    </div>
  </div>

  <!-- JS Bootstrap + jQuery + Select2 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <!-- Mon JS -->
  <script src="script.js"></script>
</body>
</html>
