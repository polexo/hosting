<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calcul de carrelage sans découpe</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Select2 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h3>Calcul du nombre de carreaux (sans découpe)</h3>
      </div>
      <div class="card-body">
        <form id="formCarrelage" class="row g-3">
          <div class="col-md-6">
            <label for="longueurMur" class="form-label">Largeur du mur (cm)</label>
            <select class="form-select" id="longueurMur" required>
              <!-- Options de 30 à 150 -->
              <script>
                for (let i = 30; i <= 150; i++) {
                  document.write(`<option value="${i}">${i} cm</option>`);
                }
              </script>
            </select>
          </div>
          <div class="col-md-6">
            <label for="hauteurMur" class="form-label">Hauteur du mur (cm)</label>
            <select class="form-select" id="hauteurMur" required>
              <!-- Options de 30 à 300 -->
              <script>
                for (let i = 30; i <= 300; i++) {
                  document.write(`<option value="${i}">${i} cm</option>`);
                }
              </script>
            </select>
          </div>
          <div class="col-md-6">
            <label for="longueurCarreau" class="form-label">Largeur du carreau (cm)</label>
            <input type="number" class="form-control" id="longueurCarreau" required>
          </div>
          <div class="col-md-6">
            <label for="hauteurCarreau" class="form-label">Hauteur du carreau (cm)</label>
            <input type="number" class="form-control" id="hauteurCarreau" required>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-success">Calculer</button>
          </div>
        </form>
      </div>
    </div>

    <div id="resultat" class="mt-4"></div>
  </div>

  <!-- JS Bootstrap + Select2 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <script>
    // Activer Select2 sur les menus déroulants
    $(document).ready(function() {
      $('#longueurMur').select2({ placeholder: "Choisir largeur du mur", width: '100%' });
      $('#hauteurMur').select2({ placeholder: "Choisir hauteur du mur", width: '100%' });
    });

    document.getElementById("formCarrelage").addEventListener("submit", function(e) {
      e.preventDefault();

      const largeurMur = parseFloat(document.getElementById("longueurMur").value);
      const hauteurMur = parseFloat(document.getElementById("hauteurMur").value);
      const largeurCarreau = parseFloat(document.getElementById("longueurCarreau").value);
      const hauteurCarreau = parseFloat(document.getElementById("hauteurCarreau").value);

      // Calcul sans découpe (arrondi inférieur)
      const nbLargeur = Math.floor(largeurMur / largeurCarreau);
      const nbHauteur = Math.floor(hauteurMur / hauteurCarreau);
      const nbTotal = nbLargeur * nbHauteur;

      document.getElementById("resultat").innerHTML = `
        <div class="card border-info">
          <div class="card-body">
            <h4 class="card-title">Résultats :</h4>
            <ul class="list-group list-group-flush">
              <li class="list-group-item">Carreaux en largeur : <strong>${nbLargeur}</strong></li>
              <li class="list-group-item">Carreaux en hauteur : <strong>${nbHauteur}</strong></li>
              <li class="list-group-item">Nombre total de carreaux (sans découpe) : <strong>${nbTotal}</strong></li>
            </ul>
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
